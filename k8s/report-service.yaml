apiVersion: v1
kind: Service
metadata:
  name: report-service
spec:
  type: NodePort
  selector:
    app: report-service
  ports:
    - port: 8004
      targetPort: 8004
      nodePort: 30004
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: report-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: report-service
  template:
    metadata:
      labels:
        app: report-service
    spec:
      containers:
      - name: report-service
        image: nutritionapp-report_service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8004
        env:
        - name: DATABASE_URL
          value: "postgresql://user:password@db:5432/app_db"