apiVersion: apps/v1
kind: Deployment
metadata:
  name: nutrition-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nutrition
  template:
    metadata:
      labels:
        app: nutrition
    spec:
      containers:
      - name: nutrition-service
        image: nutritionapp-nutrition_service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8002
        env:
        - name: DATABASE_URL
          value: "postgresql://user:password@db:5432/app_db"
        - name: REDIS_HOST
          value: "redis"
---
apiVersion: v1
kind: Service
metadata:
  name: nutrition-service
spec:
  type: LoadBalancer
  selector:
    app: nutrition
  ports:
    - port: 8002
      targetPort: 8002